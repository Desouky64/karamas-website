<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karma's Website</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #121319;
    --panel: #1B1D25;
    --panel-raised: #21232C;
    --line: #2C2F3A;
    --text: #ECE9E2;
    --text-dim: #8C8F9C;
    --amber: #FF7A33;
    --amber-dim: #6E3A1C;
    --teal: #2EC4B6;
    --red: #E2453A;
  }
  *{ box-sizing: border-box; }
  html, body{
    margin:0; padding:0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }
  body{
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 32px 16px;
  }

  .console{
    width: 100%;
    max-width: 880px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 28px;
    position: relative;
  }

  .console::before{
    content:"";
    position:absolute;
    top:10px; left:10px; right:10px; bottom:10px;
    border: 1px solid rgba(255,255,255,0.04);
    border-radius: 12px;
    pointer-events:none;
  }

  .marquee{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom: 22px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .marquee h1{
    font-family: 'Bebas Neue', sans-serif;
    font-size: 44px;
    letter-spacing: 2px;
    margin: 0;
    color: var(--text);
    line-height: 1;
  }

  .marquee h1 span{
    color: var(--amber);
  }

  .channel-tag{
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 6px 14px;
    letter-spacing: 1px;
  }

  .tuner{
    display:flex;
    gap: 10px;
    margin-bottom: 18px;
  }

  .tuner input{
    flex:1;
    min-width: 0;
    background: var(--panel-raised);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 13px 16px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s ease;
  }

  .tuner input::placeholder{
    color: var(--text-dim);
  }

  .tuner input:focus{
    border-color: var(--amber);
  }

  .tuner button{
    background: var(--amber);
    color: #1A1100;
    border: none;
    border-radius: 10px;
    padding: 0 22px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    display:flex;
    align-items:center;
    gap: 8px;
    transition: filter 0.15s ease, transform 0.05s ease;
    white-space: nowrap;
  }

  .tuner button:hover{ filter: brightness(1.08); }
  .tuner button:active{ transform: scale(0.97); }

  .tuner button svg{ width:14px; height:14px; }

  .hint{
    font-size: 12px;
    color: var(--text-dim);
    margin: 0 0 22px 2px;
  }

  .screen-wrap{
    background: #000;
    border-radius: 12px;
    border: 1px solid var(--line);
    overflow: hidden;
    position: relative;
    aspect-ratio: 16 / 9;
  }

  .screen-wrap iframe{
    width: 100%;
    height: 100%;
    border: none;
    display: none;
  }

  .static-screen{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap: 14px;
    background:
      repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.025) 0px,
        rgba(255,255,255,0.025) 1px,
        transparent 1px,
        transparent 3px
      ),
      #0B0B0E;
  }

  .static-screen .ring{
    width: 64px; height: 64px;
    border-radius: 50%;
    border: 1.5px solid var(--line);
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .static-screen .ring svg{
    width: 22px; height: 22px;
    fill: var(--text-dim);
  }

  .static-screen p{
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 1.5px;
    margin: 0;
  }

  .status-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-top: 16px;
  }

  .status{
    display:flex;
    align-items:center;
    gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--text-dim);
  }

  .dot{
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text-dim);
  }

  .dot.live{
    background: var(--red);
    box-shadow: 0 0 0 3px rgba(226,69,58,0.18);
  }

  .clear-btn{
    background: none;
    border: none;
    color: var(--text-dim);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 2px;
    padding: 0;
  }

  .clear-btn:hover{ color: var(--text); }

  @media (max-width: 520px){
    .marquee h1{ font-size: 34px; }
    .tuner{ flex-direction: column; }
    .tuner button{ padding: 12px; justify-content:center; }
  }
</style>
</head>
<body>

  <main class="console">
    <div class="marquee">
      <h1>KARMA'S <span>WEBSITE</span></h1>
      <div class="channel-tag">EMBED PLAYER</div>
    </div>

    <div class="tuner">
      <input id="linkInput" type="text" placeholder="Paste an embed link or <iframe> code here" autocomplete="off" />
      <button id="playBtn">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        Play
      </button>
    </div>
    <p class="hint">Works with any direct embed URL or a full &lt;iframe&gt; tag. Nothing is uploaded — it loads straight in your browser.</p>

    <div class="screen-wrap">
      <iframe id="player" allowfullscreen allow="encrypted-media; picture-in-picture; autoplay"></iframe>
      <div class="static-screen" id="staticScreen">
        <div class="ring">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
        <p id="statusText">NO SIGNAL — PASTE A LINK TO BEGIN</p>
      </div>
    </div>

    <div class="status-row">
      <div class="status">
        <span class="dot" id="statusDot"></span>
        <span id="statusLabel">STANDBY</span>
      </div>
      <button class="clear-btn" id="clearBtn">Clear</button>
    </div>
  </main>

<script>
  const linkInput = document.getElementById('linkInput');
  const playBtn = document.getElementById('playBtn');
  const player = document.getElementById('player');
  const staticScreen = document.getElementById('staticScreen');
  const statusDot = document.getElementById('statusDot');
  const statusLabel = document.getElementById('statusLabel');
  const statusText = document.getElementById('statusText');
  const clearBtn = document.getElementById('clearBtn');

  function extractSrc(raw){
    const trimmed = raw.trim();
    const match = trimmed.match(/<iframe[^>]*\ssrc=["']([^"']+)["']/i);
    if (match) return match[1];
    return trimmed;
  }

  function isLikelyUrl(str){
    try{
      const u = new URL(str);
      return u.protocol === 'http:' || u.protocol === 'https:';
    }catch(e){
      return false;
    }
  }

  function loadLink(){
    const src = extractSrc(linkInput.value);
    if (!src){
      statusText.textContent = 'NO LINK ENTERED';
      return;
    }
    if (!isLikelyUrl(src)){
      statusText.textContent = "COULDN'T READ THAT LINK — CHECK IT AND TRY AGAIN";
      return;
    }
    player.src = src;
    player.style.display = 'block';
    staticScreen.style.display = 'none';
    statusDot.classList.add('live');
    statusLabel.textContent = 'PLAYING';
  }

  function clearPlayer(){
    player.src = '';
    player.style.display = 'none';
    staticScreen.style.display = 'flex';
    statusText.textContent = 'NO SIGNAL — PASTE A LINK TO BEGIN';
    statusDot.classList.remove('live');
    statusLabel.textContent = 'STANDBY';
    linkInput.value = '';
  }

  playBtn.addEventListener('click', loadLink);
  clearBtn.addEventListener('click', clearPlayer);
  linkInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') loadLink();
  });
</script>

</body>
</html>
